# ─── Clinical Code Reference ────────────────────────────────────────

type CodeDefinition {
  code: String!
  system: String!
  description: String!
  category: String
  isCommon: Boolean!
}

# ─── Queries ──────────────────────────────────────────────────────────


type Query {
  pathwayServiceHealth: Boolean!
  pathways(status: PathwayStatus, category: PathwayCategory, first: Int): [Pathway!]!
  pathway(id: ID!): Pathway
  pathwayGraph(id: ID!): PathwayGraph

  pathwayConfidence(
    pathwayId: ID!
    patientContext: PatientContextInput!
    institutionId: ID
    organizationId: ID
  ): PathwayConfidenceResult!

  signalDefinitions(
    scope: SignalScope
    institutionId: ID
  ): [SignalDefinitionType!]!

  effectiveWeights(
    pathwayId: ID!
    institutionId: ID
    organizationId: ID
  ): WeightMatrix!

  effectiveThresholds(
    pathwayId: ID!
    nodeIdentifier: String
    institutionId: ID
    organizationId: ID
  ): ResolvedThresholds!

  adminEvidenceEntries(pathwayId: ID!, nodeIdentifier: String): [AdminEvidenceEntry!]!

  searchCodes(query: String!, system: String, limit: Int): [CodeDefinition!]!

  matchedPathways(patientId: ID!): [MatchedPathway!]!

  """
  Find pathways whose condition-code set overlaps with this pathway's set.
  Used at upload time to surface related/conflicting/duplicate pathways for
  admin review. Excludes the input pathway itself; ACTIVE pathways only.
  Ordered by relationship strength: IDENTICAL > SUBSET > SUPERSET > PARTIAL_OVERLAP.
  """
  relatedPathways(pathwayId: ID!): [RelatedPathway!]!
  resolutionSession(sessionId: ID!): ResolutionSession
  pendingQuestions(sessionId: ID!): [PendingQuestionType!]!
  redFlags(sessionId: ID!): [RedFlagType!]!
  patientResolutionSessions(patientId: ID!, status: SessionStatus): [ResolutionSessionSummary!]!

  """Fetch a single multi-pathway resolution session including its merged plan."""
  multiPathwayResolutionSession(sessionId: ID!): MultiPathwayResolutionSession

  """List a patient's multi-pathway sessions, optionally filtered by status."""
  patientMultiPathwayResolutionSessions(
    patientId: ID!,
    status: MultiPathwayResolutionSessionStatus
  ): [MultiPathwayResolutionSessionSummary!]!

  """
  Admin queue: medications whose RxNav normalization failed at import or
  snapshot ingestion. Surfaced here for a clinician to manually resolve
  via `manuallyResolveMedicationNormalization`.
  """
  unnormalizedMedications: [UnnormalizedMedication!]!
}

# ─── Phase 4 admin queue ─────────────────────────────────────────────

type UnnormalizedMedication {
  inputText: String!
  inputSystem: String
  inputCode: String
  attemptedAt: String!
}

type ManuallyResolvedMedication {
  inputText: String!
  inputSystem: String
  inputCode: String
  ingredientRxcui: String!
  ingredientName: String!
  atcClasses: [String!]!
}

# ─── Mutations ─────────────────────────────────────────────────────────

type Mutation {
  """
  Import a clinical pathway from JSON. Supports three modes:
  - NEW_PATHWAY: First import of a new pathway
  - DRAFT_UPDATE: Re-import of an existing DRAFT pathway (applies diff)
  - NEW_VERSION: Create a new version of an existing pathway

  pathwayJson is a JSON string conforming to the PathwayJson schema (see
  apps/pathway-service/src/services/import/types.ts). It includes schema_version,
  pathway metadata, nodes array, and edges array. The pipeline validates the
  full structure and returns all errors at once.
  """
  importPathway(pathwayJson: String!, importMode: ImportMode!): ImportPathwayResult!

  """Activate a DRAFT pathway, making it available for patient matching."""
  activatePathway(id: ID!): PathwayStatusResult!

  """Archive an ACTIVE pathway, removing it from patient matching."""
  archivePathway(id: ID!): PathwayStatusResult!

  """Reactivate a SUPERSEDED or ARCHIVED pathway."""
  reactivatePathway(id: ID!): PathwayStatusResult!

  createSignalDefinition(input: CreateSignalDefinitionInput!): SignalDefinitionType!
  updateSignalDefinition(id: ID!, input: UpdateSignalDefinitionInput!): SignalDefinitionType!
  deleteSignalDefinition(id: ID!): Boolean!

  setSignalWeight(input: SetSignalWeightInput!): SignalWeight!
  removeSignalWeight(id: ID!): Boolean!

  setNodeWeight(input: SetNodeWeightInput!): NodeWeight!
  removeNodeWeight(id: ID!): Boolean!

  setResolutionThresholds(input: SetResolutionThresholdsInput!): ResolutionThresholds!
  removeResolutionThresholds(id: ID!): Boolean!

  addAdminEvidence(input: AddAdminEvidenceInput!): AdminEvidenceEntry!
  removeAdminEvidence(id: ID!): Boolean!

  startResolution(pathwayId: ID!, patientId: ID!, patientContext: PatientContextInput): ResolutionSession!

  """
  Run resolution against every pathway that matches the patient and merge
  the results into a single care plan, persisting both the per-pathway
  sessions and the multi-pathway session. Soft conflicts (medications with
  the same clinical_role across pathways) are surfaced inside
  `mergedPlan.conflicts` for the provider to resolve via `resolveConflict`.
  Once all conflicts are resolved, `generateMergedCarePlan` materializes
  the actual care plan rows.
  """
  startMultiPathwayResolution(patientId: ID!, patientContext: PatientContextInput): MultiPathwayResolutionSession!

  """
  Record a provider's choice for one conflict. The session's mergedPlan is
  rewritten to reflect the choice (chosen drug moves to PROVIDER_CONFIRMED,
  losers move to PROVIDER_OVERRIDE; CUSTOM_OVERRIDE attaches a write-in
  recommendation). Returns the updated session.
  """
  resolveConflict(sessionId: ID!, conflictId: String!, choice: ConflictChoiceInput!): MultiPathwayResolutionSession!

  """
  Materialize the merged plan into actual care_plans / care_plan_goals /
  care_plan_interventions rows. Returns `success=false` with blockers if
  any conflict is unresolved or if validation fails.
  """
  generateMergedCarePlan(sessionId: ID!): CarePlanGenerationResult!

  """Mark a multi-pathway session ABANDONED."""
  abandonMultiPathwaySession(sessionId: ID!, reason: String): MultiPathwayResolutionSession!

  """
  Phase 4: clinician-supplied resolution for a medication that failed to
  normalize. Provide the canonical RxCUI; the system fetches ATC classes
  from RxNav and rewrites the cache entry. Returns the resolved record.
  """
  manuallyResolveMedicationNormalization(
    inputText: String!,
    inputSystem: String,
    inputCode: String,
    rxcui: String!
  ): ManuallyResolvedMedication!
  overrideNode(sessionId: ID!, nodeId: ID!, action: OverrideAction!, reason: String): ResolutionSession!
  answerGateQuestion(sessionId: ID!, gateId: ID!, answer: GateAnswerInput!): ResolutionSession!
  addPatientContext(sessionId: ID!, additionalContext: AdditionalContextInput!): ResolutionSession!
  generateCarePlanFromResolution(sessionId: ID!): CarePlanGenerationResult!
  abandonSession(sessionId: ID!, reason: String): ResolutionSession!
}
