extend schema @link(url: "https://specs.apollo.dev/federation/v2.10", import: ["@key", "@external", "@shareable"])

# ─── Enums ─────────────────────────────────────────────────────────────

enum PathwayStatus {
  DRAFT
  ACTIVE
  ARCHIVED
  SUPERSEDED
}

enum PathwayCategory {
  CHRONIC_DISEASE
  ACUTE_CARE
  PREVENTIVE_CARE
  POST_PROCEDURE
  MEDICATION_MANAGEMENT
  LIFESTYLE_MODIFICATION
  MENTAL_HEALTH
  PEDIATRIC
  GERIATRIC
  OBSTETRIC
}

enum ImportMode {
  NEW_PATHWAY
  DRAFT_UPDATE
  NEW_VERSION
}

enum ScoringType {
  DATA_PRESENCE
  MAPPING_LOOKUP
  CRITERIA_MATCH
  RISK_INVERSE
  CUSTOM_RULES
}

enum SignalScope { SYSTEM ORGANIZATION INSTITUTION }
enum WeightScope { NODE PATHWAY INSTITUTION_GLOBAL ORGANIZATION_GLOBAL }
enum ThresholdScope { SYSTEM_DEFAULT ORGANIZATION INSTITUTION PATHWAY NODE }
enum WeightSource { NODE_OVERRIDE PATHWAY_OVERRIDE INSTITUTION_GLOBAL ORGANIZATION_GLOBAL SYSTEM_DEFAULT }
enum PropagationMode { NONE DIRECT TRANSITIVE_WITH_DECAY }
enum ResolutionType { AUTO_RESOLVED SYSTEM_SUGGESTED PROVIDER_DECIDED FORCED_MANUAL }

enum SessionStatus { ACTIVE COMPLETED ABANDONED DEGRADED }
enum NodeStatus { INCLUDED EXCLUDED GATED_OUT PENDING_QUESTION TIMEOUT CASCADE_LIMIT UNKNOWN }
enum OverrideAction { INCLUDE EXCLUDE }
enum AnswerType { BOOLEAN NUMERIC SELECT }
enum BlockerType { EMPTY_PLAN UNRESOLVED_RED_FLAG CONTRADICTION PENDING_GATE }

