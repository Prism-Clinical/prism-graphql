# ─── Queries ──────────────────────────────────────────────────────────


type Query {
  pathwayServiceHealth: Boolean!
  pathways(status: PathwayStatus, category: PathwayCategory, first: Int): [Pathway!]!
  pathway(id: ID!): Pathway
  pathwayGraph(id: ID!): PathwayGraph

  pathwayConfidence(
    pathwayId: ID!
    patientContext: PatientContextInput!
    institutionId: ID
    organizationId: ID
  ): PathwayConfidenceResult!

  signalDefinitions(
    scope: SignalScope
    institutionId: ID
  ): [SignalDefinitionType!]!

  effectiveWeights(
    pathwayId: ID!
    institutionId: ID
    organizationId: ID
  ): WeightMatrix!

  effectiveThresholds(
    pathwayId: ID!
    nodeIdentifier: String
    institutionId: ID
    organizationId: ID
  ): ResolvedThresholds!

  adminEvidenceEntries(pathwayId: ID!, nodeIdentifier: String): [AdminEvidenceEntry!]!

  searchCodes(query: String!, system: String, limit: Int): [CodeDefinition!]!

  matchedPathways(patientId: ID!): [MatchedPathway!]!
  resolutionSession(sessionId: ID!): ResolutionSession
  pendingQuestions(sessionId: ID!): [PendingQuestionType!]!
  redFlags(sessionId: ID!): [RedFlagType!]!
  patientResolutionSessions(patientId: ID!, status: SessionStatus): [ResolutionSessionSummary!]!
}

# ─── Mutations ─────────────────────────────────────────────────────────

type Mutation {
  """
  Import a clinical pathway from JSON. Supports three modes:
  - NEW_PATHWAY: First import of a new pathway
  - DRAFT_UPDATE: Re-import of an existing DRAFT pathway (applies diff)
  - NEW_VERSION: Create a new version of an existing pathway

  pathwayJson is a JSON string conforming to the PathwayJson schema (see
  apps/pathway-service/src/services/import/types.ts). It includes schema_version,
  pathway metadata, nodes array, and edges array. The pipeline validates the
  full structure and returns all errors at once.
  """
  importPathway(pathwayJson: String!, importMode: ImportMode!): ImportPathwayResult!

  """Activate a DRAFT pathway, making it available for patient matching."""
  activatePathway(id: ID!): PathwayStatusResult!

  """Archive an ACTIVE pathway, removing it from patient matching."""
  archivePathway(id: ID!): PathwayStatusResult!

  """Reactivate a SUPERSEDED or ARCHIVED pathway."""
  reactivatePathway(id: ID!): PathwayStatusResult!

  createSignalDefinition(input: CreateSignalDefinitionInput!): SignalDefinitionType!
  updateSignalDefinition(id: ID!, input: UpdateSignalDefinitionInput!): SignalDefinitionType!
  deleteSignalDefinition(id: ID!): Boolean!

  setSignalWeight(input: SetSignalWeightInput!): SignalWeight!
  removeSignalWeight(id: ID!): Boolean!

  setNodeWeight(input: SetNodeWeightInput!): NodeWeight!
  removeNodeWeight(id: ID!): Boolean!

  setResolutionThresholds(input: SetResolutionThresholdsInput!): ResolutionThresholds!
  removeResolutionThresholds(id: ID!): Boolean!

  addAdminEvidence(input: AddAdminEvidenceInput!): AdminEvidenceEntry!
  removeAdminEvidence(id: ID!): Boolean!

  startResolution(pathwayId: ID!, patientId: ID!, patientContext: PatientContextInput): ResolutionSession!
  overrideNode(sessionId: ID!, nodeId: ID!, action: OverrideAction!, reason: String): ResolutionSession!
  answerGateQuestion(sessionId: ID!, gateId: ID!, answer: GateAnswerInput!): ResolutionSession!
  addPatientContext(sessionId: ID!, additionalContext: AdditionalContextInput!): ResolutionSession!
  generateCarePlanFromResolution(sessionId: ID!): CarePlanGenerationResult!
  abandonSession(sessionId: ID!, reason: String): ResolutionSession!
}
