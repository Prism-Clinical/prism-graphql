extend schema @link(url: "https://specs.apollo.dev/federation/v2.10", import: ["@key", "@external", "@shareable"])

# ─── Enums ─────────────────────────────────────────────────────────────

enum PathwayStatus {
  DRAFT
  ACTIVE
  ARCHIVED
  SUPERSEDED
}

enum PathwayCategory {
  CHRONIC_DISEASE
  ACUTE_CARE
  PREVENTIVE_CARE
  POST_PROCEDURE
  MEDICATION_MANAGEMENT
  LIFESTYLE_MODIFICATION
  MENTAL_HEALTH
  PEDIATRIC
  GERIATRIC
  OBSTETRIC
}

enum ImportMode {
  NEW_PATHWAY
  DRAFT_UPDATE
  NEW_VERSION
}

enum ScoringType {
  DATA_PRESENCE
  MAPPING_LOOKUP
  CRITERIA_MATCH
  RISK_INVERSE
  CUSTOM_RULES
}

enum SignalScope { SYSTEM ORGANIZATION INSTITUTION }
enum WeightScope { NODE PATHWAY INSTITUTION_GLOBAL ORGANIZATION_GLOBAL }
enum ThresholdScope { SYSTEM_DEFAULT ORGANIZATION INSTITUTION PATHWAY NODE }
enum WeightSource { NODE_OVERRIDE PATHWAY_OVERRIDE INSTITUTION_GLOBAL ORGANIZATION_GLOBAL SYSTEM_DEFAULT }
enum PropagationMode { NONE DIRECT TRANSITIVE_WITH_DECAY }
enum ResolutionType { AUTO_RESOLVED SYSTEM_SUGGESTED PROVIDER_DECIDED FORCED_MANUAL }

enum SessionStatus { ACTIVE COMPLETED ABANDONED DEGRADED }
enum NodeStatus { INCLUDED EXCLUDED GATED_OUT PENDING_QUESTION TIMEOUT CASCADE_LIMIT UNKNOWN }
enum OverrideAction { INCLUDE EXCLUDE }
enum AnswerType { BOOLEAN NUMERIC SELECT }
enum BlockerType { EMPTY_PLAN UNRESOLVED_RED_FLAG CONTRADICTION PENDING_GATE }

# ─── Core Types ────────────────────────────────────────────────────────

type Pathway @key(fields: "id") {
  id: ID!
  logicalId: String!
  title: String!
  version: String!
  category: PathwayCategory!
  status: PathwayStatus!
  conditionCodes: [String!]!
  scope: String
  targetPopulation: String
  isActive: Boolean!
  createdAt: String!
  updatedAt: String!
}

type PathwayGraphNode {
  id: String!
  type: String!
  properties: JSON!
}

type PathwayGraphEdge {
  from: String!
  to: String!
  type: String!
  properties: JSON
}

type PathwayConditionCode {
  code: String!
  system: String!
  description: String
  usage: String
  grouping: String
}

type PathwayGraph {
  pathway: Pathway!
  nodes: [PathwayGraphNode!]!
  edges: [PathwayGraphEdge!]!
  conditionCodeDetails: [PathwayConditionCode!]!
}

# ─── Import Types ──────────────────────────────────────────────────────

type ValidationResult {
  valid: Boolean!
  errors: [String!]!
  warnings: [String!]!
}

type ImportDiffSummary {
  nodesAdded: Int!
  nodesRemoved: Int!
  nodesModified: Int!
  edgesAdded: Int!
  edgesRemoved: Int!
  edgesModified: Int!
}

type DiffDetail {
  entityType: String!
  action: String!
  entityId: String!
  entityLabel: String!
}

type ImportDiff {
  summary: ImportDiffSummary!
  details: [DiffDetail!]!
  """True when the diff is a placeholder (creation summary or graph reconstruction unavailable)."""
  synthetic: Boolean!
}

type ImportPathwayResult {
  pathway: Pathway
  validation: ValidationResult!
  diff: ImportDiff
  importType: ImportMode!
}

type PathwayStatusResult {
  pathway: Pathway!
  previousStatus: PathwayStatus!
}

# ─── Confidence Types ─────────────────────────────────────────────────

type PathwayConfidenceResult {
  pathwayId: ID!
  overallConfidence: Float!
  nodes: [NodeConfidenceResult!]!
}

type NodeConfidenceResult {
  nodeIdentifier: String!
  nodeType: String!
  confidence: Float!
  resolutionType: ResolutionType
  breakdown: [SignalBreakdown!]!
  propagationInfluences: [PropagationInfluence!]!
}

type SignalBreakdown {
  signalName: String!
  score: Float!
  weight: Float!
  weightSource: WeightSource!
  missingInputs: [String!]!
}

type PropagationInfluence {
  sourceNodeIdentifier: String!
  signalName: String!
  originalScore: Float!
  propagatedScore: Float!
  hopDistance: Int!
}

type SignalDefinitionType {
  id: ID!
  name: String!
  displayName: String!
  description: String
  scoringType: ScoringType!
  scoringRules: JSON!
  propagationConfig: PropagationConfigType
  scope: SignalScope!
  institutionId: ID
  defaultWeight: Float!
  isActive: Boolean!
}

type PropagationConfigType {
  mode: PropagationMode!
  decayFactor: Float
  maxHops: Int
  edgeTypes: [String!]
  sourceNodeTypes: [String!]
  immuneToSignals: [String!]
}

type SignalWeight {
  id: ID!
  signalDefinitionId: ID!
  weight: Float!
  scope: WeightScope!
  pathwayId: ID
  nodeIdentifier: String
  nodeType: String
  institutionId: ID
}

type NodeWeight {
  id: ID!
  pathwayId: ID!
  nodeIdentifier: String!
  nodeType: String!
  defaultWeight: Float!
  institutionId: ID
  weightOverride: Float
  propagationOverrides: JSON
}

type ResolutionThresholds {
  id: ID!
  autoResolveThreshold: Float!
  suggestThreshold: Float!
  scope: ThresholdScope!
  pathwayId: ID
  nodeIdentifier: String
  institutionId: ID
}

type WeightMatrixEntry {
  nodeIdentifier: String!
  signalName: String!
  weight: Float!
  source: WeightSource!
}

type WeightMatrix {
  entries: [WeightMatrixEntry!]!
}

type ResolvedThresholds {
  autoResolveThreshold: Float!
  suggestThreshold: Float!
  scope: ThresholdScope!
}

# ─── Resolution Types ─────────────────────────────────────────────────

type MatchedPathway {
  pathway: Pathway!
  matchedConditionCodes: [String!]!
  matchScore: Float!
}

type ResolutionSession {
  id: ID!
  pathwayId: ID!
  pathwayVersion: String!
  patientId: ID!
  providerId: ID!
  status: SessionStatus!
  includedNodes: [ResolvedNode!]!
  excludedNodes: [ResolvedNode!]!
  gatedOutNodes: [ResolvedNode!]!
  pendingQuestions: [PendingQuestionType!]!
  redFlags: [RedFlagType!]!
  resolutionEvents: [ResolutionEventType!]!
  totalNodesEvaluated: Int!
  traversalDurationMs: Int!
  createdAt: String!
  updatedAt: String!
}

type ResolutionSessionSummary {
  id: ID!
  pathwayId: ID!
  pathwayTitle: String!
  status: SessionStatus!
  totalNodesEvaluated: Int!
  includedCount: Int!
  redFlagCount: Int!
  carePlanId: ID
  createdAt: String!
  updatedAt: String!
}

type ResolvedNode {
  nodeId: ID!
  nodeType: String!
  title: String!
  status: NodeStatus!
  confidence: Float!
  confidenceBreakdown: [SignalBreakdown!]!
  providerOverride: ProviderOverrideType
  excludeReason: String
  parentNodeId: ID
  depth: Int!
}

type ProviderOverrideType {
  action: OverrideAction!
  reason: String
  originalStatus: NodeStatus!
  originalConfidence: Float!
}

type ResolutionEventType {
  id: ID!
  eventType: String!
  triggerData: JSON
  nodesRecomputed: Int!
  statusChanges: JSON
  createdAt: String!
}

type RedFlagType {
  nodeId: ID!
  nodeTitle: String!
  type: String!
  description: String!
  branches: [RedFlagBranchType!]
}

type RedFlagBranchType {
  nodeId: ID!
  title: String!
  confidence: Float!
  topExcludeReason: String
}

type PendingQuestionType {
  gateId: ID!
  prompt: String!
  answerType: AnswerType!
  options: [String!]
  affectedSubtreeSize: Int!
  estimatedImpact: String!
}

type CarePlanGenerationResult {
  success: Boolean!
  carePlanId: ID
  warnings: [String!]!
  blockers: [ValidationBlockerType!]!
}

type ValidationBlockerType {
  type: BlockerType!
  description: String!
  relatedNodeIds: [ID!]!
}

# ─── Resolution Inputs ───────────────────────────────────────────────

input GateAnswerInput {
