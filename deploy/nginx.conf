# Prism Healthcare Platform — Nginx Reverse Proxy
# Installed to: /etc/nginx/sites-available/prism
# Symlinked from: /etc/nginx/sites-enabled/prism
#
# SSL certificates managed by certbot (--nginx plugin).
# Replace DOMAIN with your actual domain before deploying.

# ── HTTP → HTTPS redirect ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.DOMAIN admin.DOMAIN app.DOMAIN;
    return 301 https://$host$request_uri;
}

# ── api.DOMAIN → Gateway (:4000) ────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.DOMAIN;

    # SSL certs (certbot will fill these in)
    ssl_certificate     /etc/letsencrypt/live/api.DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forwarding headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running GraphQL operations
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# ── admin.DOMAIN → Admin Dashboard (:3001) ──────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/admin.DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── app.DOMAIN → Provider Dashboard (:3000) ─────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/app.DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
